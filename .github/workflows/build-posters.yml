name: Build posters

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install Japanese font (IPAゴシック)
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-ipafont-gothic

      - name: Install Python dependencies
        run: |
          pip install -r divider-poster/requirements.txt
          pip install -r opamp-poster/requirements.txt
          pip install -r resistor-poster/requirements.txt

      - name: Build divider-poster
        working-directory: divider-poster
        run: python make_poster_final.py

      - name: Build opamp-poster
        working-directory: opamp-poster
        run: |
          python make_opamp_poster.py
          python make_opamp_poster_a4.py

      - name: Build resistor-poster
        working-directory: resistor-poster
        run: python make_poster.py

      - name: Collect PDFs
        run: |
          mkdir -p dist
          cp divider-poster/voltage_divider_poster_A2.pdf dist/divider-poster-a2.pdf
          cp divider-poster/voltage_divider_poster_A4.pdf dist/divider-poster-a4.pdf
          cp opamp-poster/opamp_poster.pdf dist/opamp-poster-a2.pdf
          cp opamp-poster/opamp_poster_a4.pdf dist/opamp-poster-a4.pdf
          cp resistor-poster/output/resistor_series_poster.pdf dist/resistor-poster.pdf

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: posters
          path: dist/*.pdf

      - name: Publish tagged release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: dist/*.pdf

      - name: Publish rolling "latest" release
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest build
          prerelease: true
          files: dist/*.pdf
